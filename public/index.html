<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuantiFy — Development Services Division</title>
<style>
:root{--brand:#b5c827;--dark:#1f2937;--gray:#6b7280;--bg:#f3f4f6;--danger:#dc2626;--ok:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark)}
header{background:var(--dark);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:20px}header h1 span{color:var(--brand)}
header small{color:#9ca3af;display:block;font-size:11px}
nav button{background:none;border:none;color:#d1d5db;padding:8px 14px;cursor:pointer;font-size:14px;border-radius:6px}
nav button.active,nav button:hover{background:#374151;color:#fff}
.userbox{font-size:13px;color:#d1d5db;display:flex;align-items:center;gap:10px}
main{max-width:1050px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:24px;margin-bottom:20px}
h2{font-size:18px;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin:10px 0 4px;text-transform:uppercase}
input,select{width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
input:focus,select:focus{outline:2px solid var(--brand);border-color:var(--brand)}
button.btn{background:var(--dark);color:#fff;border:none;padding:10px 18px;border-radius:6px;font-size:14px;cursor:pointer;margin-top:14px}
button.btn:hover{opacity:.9}
button.btn.brand{background:var(--brand);color:var(--dark);font-weight:700}
button.btn.danger{background:var(--danger)}
button.btn.sm{padding:5px 10px;font-size:12px;margin-top:0}
.err{color:var(--danger);font-size:13px;margin-top:10px}.ok{color:var(--ok);font-size:13px;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#e5e7eb;text-align:left;padding:8px;font-size:11px;text-transform:uppercase;color:#374151}
td{padding:9px 8px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
tr:hover td{background:#f9fafb}
.qtable input{padding:6px 8px;font-size:13px}
.qtable td.num{text-align:right}
.dd{position:relative}
.dd-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:0 0 6px 6px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 4px 10px rgba(0,0,0,.15)}
.dd-list div{padding:8px 10px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;gap:8px}
.dd-list div:hover,.dd-list div.hl{background:var(--brand)}
.dd-list small{color:var(--gray);white-space:nowrap}
.totals{margin-top:14px;margin-left:auto;width:280px;font-size:14px}
.totals div{display:flex;justify-content:space-between;padding:5px 0}
.totals .grand{font-weight:700;border-top:2px solid var(--dark);font-size:16px}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.tag.ACTIVE{background:#dcfce7;color:#166534}.tag.PENDING{background:#fef9c3;color:#854d0e}.tag.DISABLED{background:#fee2e2;color:#991b1b}
.tag.ADMIN{background:#ede9fe;color:#5b21b6}.tag.USER{background:#e0f2fe;color:#075985}
.deptbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.deptbar button{background:#fff;border:1px solid #d1d5db;padding:8px 14px;border-radius:99px;cursor:pointer;font-size:13px}
.deptbar button.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.row2{grid-template-columns:1fr}}
footer{text-align:center;color:var(--gray);font-size:12px;padding:20px}
dialog{border:none;border-radius:10px;padding:24px;max-width:480px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
dialog::backdrop{background:rgba(0,0,0,.4)}
.hidden{display:none}
.actions{display:flex;gap:8px;padding-left:12px;align-items:center}
.setgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:760px){.setgrid{grid-template-columns:1fr}}
.sigbox{border:1px dashed #d1d5db;border-radius:8px;padding:14px;text-align:center;background:#fafafa}
.sigbox img{max-height:70px;max-width:100%;background:#fff;border:1px solid #eee;padding:4px;border-radius:4px}
body.dark{--bg:#0f172a;--dark:#e5e7eb;--gray:#94a3b8;color:#e5e7eb}
body.dark .card{background:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.5)}
body.dark input,body.dark select{background:#0f172a;color:#e5e7eb;border-color:#334155}
body.dark th{background:#334155;color:#cbd5e1}
body.dark td{border-color:#334155}
body.dark tr:hover td{background:#273449}
body.dark .deptbar button{background:#1e293b;color:#e5e7eb;border-color:#334155}
body.dark .deptbar button.active{background:#b5c827;color:#111}
body.dark button.btn{background:#334155;color:#e5e7eb}
body.dark button.btn.brand{background:var(--brand);color:#111}
body.dark button.btn.danger{background:var(--danger);color:#fff}
body.dark .dd-list{background:#1e293b;border-color:#334155;color:#e5e7eb}
body.dark .sigbox{background:#0f172a;border-color:#334155}
body.dark .totals .grand{border-color:#e5e7eb}
</style>
</head>
<body>
<header>
  <div><h1>Quanti<span>Fy</span></h1><small>DEVELOPMENT SERVICES DIVISION · FDC</small></div>
  <nav id="nav" class="hidden">
    <button data-view="list" class="active">Quantifications</button>
    <button data-view="new">+ New</button>
    <button data-view="items" id="navItems">Items</button>
    <button data-view="cad" id="navCad">CAD Quantify</button>
    <button data-view="users" id="navUsers">Users</button>
    <button data-view="audit" id="navAudit">Activity Log</button>
    <button data-view="settings">Settings</button>
  </nav>
  <div class="userbox hidden" id="userbox"><span id="uinfo"></span><button class="btn sm" onclick="logout()">Logout</button></div>
</header>
<main id="main"></main>
<footer>QuantiFy · designed and created by <b>necromenxer</b></footer>

<dialog id="dupDlg">
  <h2>Possible duplicate</h2>
  <p style="font-size:13px;margin-bottom:10px">Similar items already exist in the master list:</p>
  <div id="dupList" style="font-size:13px;max-height:200px;overflow-y:auto;margin-bottom:14px"></div>
  <button class="btn danger sm" onclick="dupDlg.close('cancel')">Don't add</button>
  <button class="btn brand sm" onclick="dupDlg.close('force')">Add anyway</button>
</dialog>

<script>
const $=s=>document.querySelector(s);
const main=$('#main'), dupDlg=$('#dupDlg');
let token=localStorage.getItem('qf_token'), me=null, DEPTS=[];
if(localStorage.getItem('qf_theme')==='dark')document.body.classList.add('dark');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

async function api(path,opts={}){
  opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers);
  if(token)opts.headers.Authorization='Bearer '+token;
  const r=await fetch('/api'+path,opts);
  if(r.status===401&&me){logout();throw new Error('Session expired');}
  const data=await r.json().catch(()=>({}));
  if(!r.ok){const e=new Error(data.error||data.message||'Request failed');e.data=data;e.status=r.status;throw e;}
  return data;
}

// ---------- auth views ----------
function loginView(msg){
  $('#nav').classList.add('hidden');$('#userbox').classList.add('hidden');
  main.innerHTML=`<div class="card" style="max-width:420px;margin:40px auto">
    <h2>Sign in</h2>
    <label>Work Email / Username</label><input id="lEmail" placeholder="user@fdc.mv">
    <label>Password</label><input id="lPass" type="password">
    <button class="btn brand" onclick="doLogin()">Login</button>
    <div class="err" id="lErr">${esc(msg||'')}</div>
    <p style="margin-top:16px;font-size:13px">No account? <a href="#" onclick="registerView();return false">Register with your @fdc.mv email</a></p>
  </div>`;
  $('#lPass').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
}
function registerView(){
  main.innerHTML=`<div class="card" style="max-width:420px;margin:40px auto">
    <h2>Register</h2>
    <label>Full Name</label><input id="rName">
    <label>Work Email (@fdc.mv)</label><input id="rEmail" placeholder="user@fdc.mv">
    <label>Password</label><input id="rPass" type="password">
    <button class="btn brand" onclick="doRegister()">Register</button>
    <div class="err" id="rErr"></div>
    <p style="margin-top:16px;font-size:13px"><a href="#" onclick="loginView();return false">Back to login</a></p>
  </div>`;
}
async function doLogin(){
  try{const d=await api('/login',{method:'POST',body:JSON.stringify({email:$('#lEmail').value,password:$('#lPass').value})});
    token=d.token;localStorage.setItem('qf_token',token);me=d.user;boot();
  }catch(e){$('#lErr').textContent=e.message;}
}
async function doRegister(){
  try{const d=await api('/register',{method:'POST',body:JSON.stringify({name:$('#rName').value,email:$('#rEmail').value,password:$('#rPass').value})});
    loginView(d.message);$('#lErr').className='ok';
  }catch(e){$('#rErr').textContent=e.message;}
}
function logout(){token=null;me=null;localStorage.removeItem('qf_token');loginView();}
// ---------- settings page ----------
let sigData;
async function settingsView(){
  me=await api('/me');
  sigData=undefined;
  main.innerHTML=`
  <div class="setgrid">
    <div class="card"><h2>User Info</h2>
      <label>Full Name</label><input id="sName" value="${esc(me.name)}">
      <label>Email / Username</label><input value="${esc(me.email)}" disabled>
      <label>Department</label><input value="${esc(me.department||'Not assigned')}" disabled>
      <label>Role</label><input value="${esc(me.role)}" disabled>
      <label>Designation</label><input id="sDesig" value="${esc(me.designation||'')}" placeholder="e.g. Technical Officer">
      <label>Contact Number</label><input id="sPhone" value="${esc(me.phone||'')}" placeholder="+960 ...">
      <label>Date of Birth</label><input id="sDob" type="date" value="${esc(me.dob||'')}">
      <button class="btn brand" onclick="saveProfile()">Save profile</button>
      <div class="ok" id="sMsg"></div>
    </div>
    <div>
      <div class="card"><h2>Digital Signature</h2>
        <p style="font-size:13px;color:var(--gray);margin-bottom:10px">Upload your signature as a PNG, up to 1MB (transparent background works best). It is printed automatically under "Prepared By" on PDFs of quantifications you create.</p>
        <div class="sigbox" id="sigBox">${me.signature?`<img src="${me.signature}" alt="signature">`:'<span style="color:var(--gray);font-size:13px">No signature uploaded</span>'}</div>
        <input type="file" id="sigFile" accept="image/png" style="margin-top:10px">
        <div style="display:flex;gap:8px">
          <button class="btn brand" onclick="saveSignature()">Save signature</button>
          ${me.signature?'<button class="btn danger" onclick="removeSignature()">Remove</button>':''}
        </div>
        <div class="err" id="sigMsg"></div>
      </div>
      <div class="card"><h2>Security</h2>
        <label>Current Password</label><input id="sPwCur" type="password">
        <label>New Password (min 6 characters)</label><input id="sPwNew" type="password">
        <label>Confirm New Password</label><input id="sPwNew2" type="password">
        <button class="btn" onclick="savePassword()">Change password</button>
        <div class="err" id="pwMsg"></div>
      </div>
      <div class="card"><h2>Look &amp; Feel</h2>
        <label>Theme</label>
        <select id="sTheme" onchange="setTheme(this.value)">
          <option value="light" ${document.body.classList.contains('dark')?'':'selected'}>Light</option>
          <option value="dark" ${document.body.classList.contains('dark')?'selected':''}>Dark</option>
        </select>
        <p style="font-size:12px;color:var(--gray);margin-top:8px">Saved on this device.</p>
      </div>
    </div>
  </div>`;
  $('#sigFile').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.type!=='image/png'){$('#sigMsg').textContent='Please choose a PNG file.';return;}
    if(f.size>1048576){$('#sigMsg').textContent='File too large (max 1MB).';return;}
    const rd=new FileReader();
    rd.onload=()=>{sigData=rd.result;$('#sigBox').innerHTML=`<img src="${sigData}" alt="signature preview">`;$('#sigMsg').textContent='';};
    rd.readAsDataURL(f);
  });
}
function setTheme(t){
  document.body.classList.toggle('dark',t==='dark');
  localStorage.setItem('qf_theme',t);
}
async function saveProfile(){
  try{
    await api('/me/profile',{method:'PUT',body:JSON.stringify({name:$('#sName').value,designation:$('#sDesig').value,phone:$('#sPhone').value,dob:$('#sDob').value})});
    me=await api('/me');
    $('#uinfo').innerHTML=`${esc(me.name)} · <span class="tag ${me.role}">${me.role}</span> ${esc(me.department||'')}`;
    $('#sMsg').textContent='Profile saved.';setTimeout(()=>$('#sMsg').textContent='',2500);
  }catch(e){$('#sMsg').className='err';$('#sMsg').textContent=e.message;}
}
async function saveSignature(){
  if(!sigData){$('#sigMsg').textContent='Choose a PNG file first.';return;}
  try{await api('/me/profile',{method:'PUT',body:JSON.stringify({signature:sigData})});settingsView();}
  catch(e){$('#sigMsg').textContent=e.message;}
}
async function removeSignature(){
  if(!confirm('Remove your saved signature?'))return;
  try{await api('/me/profile',{method:'PUT',body:JSON.stringify({signature:''})});settingsView();}
  catch(e){$('#sigMsg').textContent=e.message;}
}
async function savePassword(){
  const cur=$('#sPwCur').value,n1=$('#sPwNew').value,n2=$('#sPwNew2').value;
  if(n1!==n2){$('#pwMsg').textContent='New passwords do not match.';return;}
  try{await api('/me/password',{method:'POST',body:JSON.stringify({current:cur,next:n1})});
    $('#pwMsg').className='ok';$('#pwMsg').textContent='Password changed.';
    $('#sPwCur').value=$('#sPwNew').value=$('#sPwNew2').value='';
  }catch(e){$('#pwMsg').className='err';$('#pwMsg').textContent=e.message;}
}

// ---------- shell ----------
async function boot(){
  DEPTS=await api('/departments');
  if(token&&!me){try{me=await api('/me');}catch{logout();return;}}
  if(!me)return loginView();
  $('#nav').classList.remove('hidden');$('#userbox').classList.remove('hidden');
  $('#uinfo').innerHTML=`${esc(me.name)} · <span class="tag ${me.role}">${me.role}</span> ${esc(me.department||'')}`;
  $('#navUsers').style.display=me.role==='ADMIN'?'':'none';
  $('#navAudit').style.display=me.role==='ADMIN'?'':'none';
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    ({list:listView,new:()=>editorView(),items:itemsView,cad:cadQuantifyView,users:usersView,audit:auditView,settings:settingsView})[b.dataset.view]();
  });
  listView();
}

// ---------- quantification list ----------
let curDept='';
async function listView(){
  const rows=await api('/quantifications'+(curDept?'?department='+encodeURIComponent(curDept):''));
  main.innerHTML=`<div class="deptbar">
    <button class="${curDept===''?'active':''}" onclick="curDept='';listView()">All Departments</button>
    ${DEPTS.map(d=>`<button class="${curDept===d?'active':''}" onclick="curDept='${d}';listView()">${d}</button>`).join('')}
  </div>
  <div class="card"><h2>Quantifications ${curDept?'— '+esc(curDept):''}</h2>
  <table><thead><tr><th>Title</th><th>Department</th><th>By</th><th>Updated</th><th style="text-align:right;padding-right:20px">Grand Total</th><th style="width:180px"></th></tr></thead>
  <tbody>${rows.map(q=>{
    const grand=(q.subtotal||0)*(1+(q.gst_rate||0)/100);
    const mine=q.created_by===me.id||me.role==='ADMIN';
    return `<tr><td><b>${esc(q.title)}</b></td><td>${esc(q.department)}</td><td>${esc(q.creator_name)}</td>
    <td>${q.updated_at.slice(0,10)}</td><td style="text-align:right;padding-right:20px;white-space:nowrap">${fmt(grand)}</td>
    <td style="white-space:nowrap"><div class="actions">
      <button class="btn sm" onclick="editorView(${q.id})">${mine?'Edit':'View'}</button>
      <button class="btn sm brand" onclick="dlPdf(${q.id})">PDF</button>
      ${me.role==='ADMIN'?`<button class="btn sm danger" onclick="delQuant(${q.id})">Del</button>`:''}
    </div></td></tr>`;}).join('')||'<tr><td colspan="6" style="color:#999">No quantifications yet.</td></tr>'}
  </tbody></table></div>`;
}
async function dlPdf(id){
  const r=await fetch('/api/quantifications/'+id+'/pdf',{headers:{Authorization:'Bearer '+token}});
  const blob=await r.blob();const a=document.createElement('a');
  const cd=r.headers.get('Content-Disposition')||'';
  const m=cd.match(/filename="([^"]+)"/);
  a.href=URL.createObjectURL(blob);a.download=m?m[1]:'Quantification-'+id+'.pdf';a.click();
}
async function delQuant(id,after){if(confirm('Delete this quantification permanently?')){await api('/quantifications/'+id,{method:'DELETE'});(after||listView)();}}

// ---------- editor ----------
let lines=[],editId=null,readOnly=false;
function saveDraft(){
  if(editId||readOnly)return;
  try{localStorage.setItem('qf_draft',JSON.stringify({title:$('#qTitle')?.value??'',department:$('#qDept')?.value??'',gst_rate:$('#qGst')?.value??8,
    checked_by:$('#qChk')?.value??'',checked_designation:$('#qChkD')?.value??'',approved_by:$('#qApp')?.value??'',approved_designation:$('#qAppD')?.value??'',lines}));}catch{}
}
function loadDraft(){try{return JSON.parse(localStorage.getItem('qf_draft'));}catch{return null;}}
function clearDraft(){localStorage.removeItem('qf_draft');}
function discardDraft(){if(confirm('Discard the unsaved quantification draft?')){clearDraft();editorView();}}
async function editorView(id){
  editId=id||null;lines=[];readOnly=false;
  let q={title:'',department:me.department||DEPTS[3],gst_rate:8,checked_by:me.name,checked_designation:me.designation||'',approved_by:'',approved_designation:''};
  let hasDraft=false;
  if(!id){const d=loadDraft();if(d){q=d;lines=(d.lines||[]).map(l=>({description:l.description,unit:l.unit,qty:l.qty,rate:l.rate}));hasDraft=true;}}
  if(id){q=await api('/quantifications/'+id);lines=q.lines.map(l=>({description:l.description,unit:l.unit,qty:l.qty,rate:l.rate}));readOnly=!q.can_edit;}
  if(!lines.length)lines.push({description:'',unit:'Nos',qty:'',rate:''});
  const ro=readOnly?'disabled':'';
  main.innerHTML=`<div class="card">
    <h2>${id?(readOnly?'View':'Edit'):'New'} Quantification ${readOnly?'<span class="tag USER">read only</span>':''} ${hasDraft?'<span class="tag PENDING">draft resumed</span> <button class="btn sm danger" onclick="discardDraft()">Discard draft</button>':''}</h2>
    <div class="row2">
      <div><label>Title / Project</label><input id="qTitle" value="${esc(q.title)}" ${ro}></div>
      <div><label>Department</label><select id="qDept" ${ro}>${DEPTS.map(d=>`<option ${d===q.department?'selected':''}>${d}</option>`).join('')}</select></div>
    </div>
    <div style="margin-top:16px;overflow-x:auto"><table class="qtable" id="lineTable">
      <thead><tr><th style="width:30px">#</th><th>Description (type to search master list)</th><th style="width:80px">Unit</th><th style="width:80px">QTY</th><th style="width:90px">Rate</th><th style="width:100px;text-align:right">Amount</th><th style="width:34px"></th></tr></thead>
      <tbody id="lineBody"></tbody>
    </table></div>
    ${readOnly?'':'<button class="btn sm" onclick="addLine()">+ Add line</button>'}
    <div class="totals">
      <div><span>Total</span><b id="tSub">0.00</b></div>
      <div><span>GST <input id="qGst" type="number" step="0.1" value="${q.gst_rate}" style="width:60px;display:inline;padding:3px" ${ro} oninput="recalc()">%</span><b id="tGst">0.00</b></div>
      <div class="grand"><span>Grand Total</span><b id="tGrand">0.00</b></div>
    </div>
    <h2 style="margin-top:20px">Sign-off</h2>
    <div class="row2">
      <div><label>Prepared By — Name</label><input id="qChk" value="${esc(q.checked_by)}" ${ro}>
        <label>Prepared By — Designation</label><input id="qChkD" value="${esc(q.checked_designation)}" ${ro}></div>
      <div><label>Approved By — Name</label><input id="qApp" value="${esc(q.approved_by)}" ${ro}>
        <label>Approved By — Designation</label><input id="qAppD" value="${esc(q.approved_designation)}" ${ro}></div>
    </div>
    ${readOnly?'':`<button class="btn brand" onclick="saveQuant()">${id?'Save changes':'Create quantification'}</button>`}
    ${id?`<button class="btn" onclick="dlPdf(${id})">Download PDF</button>`:''}
    <div class="err" id="qErr"></div>
  </div>`;
  renderLines();
  if(!id&&!readOnly)['qTitle','qDept','qGst','qChk','qChkD','qApp','qAppD'].forEach(x=>$('#'+x)?.addEventListener('input',saveDraft));
}
function addLine(){lines.push({description:'',unit:'Nos',qty:'',rate:''});renderLines();saveDraft();}
function rmLine(i){
  const l=lines[i];
  if(l&&String(l.description||'').trim()&&!confirm('Remove line '+(i+1)+' ("'+l.description+'")?'))return;
  lines.splice(i,1);if(!lines.length)lines.push({description:'',unit:'Nos',qty:'',rate:''});renderLines();saveDraft();
}
function renderLines(){
  const ro=readOnly?'disabled':'';
  $('#lineBody').innerHTML=lines.map((l,i)=>`<tr>
    <td>${i+1}</td>
    <td class="dd"><input data-i="${i}" data-f="description" value="${esc(l.description)}" autocomplete="off" ${ro}></td>
    <td><input data-i="${i}" data-f="unit" value="${esc(l.unit)}" ${ro}></td>
    <td><input data-i="${i}" data-f="qty" type="number" step="any" value="${esc(l.qty)}" ${ro}></td>
    <td><input data-i="${i}" data-f="rate" type="number" step="any" value="${esc(l.rate)}" ${ro}></td>

let ddEl=null,ddItems=[],ddHl=-1,ddRow=-1,ddTimer=null,ddSeq=0;
function showDDDebounced(inp,i){clearTimeout(ddTimer);ddTimer=setTimeout(()=>showDD(inp,i),250);}
async function showDD(inp,i){
  const q=inp.value.trim();
  if(q.length<2){closeDD();return;}
  const seq=++ddSeq;
  const results=await api('/items?q='+encodeURIComponent(q));
  if(seq!==ddSeq)return; // a newer search superseded this one
  closeDD();
  ddItems=results;
  if(!ddItems.length)return;
  ddRow=i;ddHl=-1;
  ddEl=document.createElement('div');ddEl.className='dd-list';
  // fixed positioning attached to <body> so scroll containers can't clip the dropdown
  const rc=inp.getBoundingClientRect();
  ddEl.style.position='fixed';
  ddEl.style.left=rc.left+'px';
  ddEl.style.top=(rc.bottom+1)+'px';
  ddEl.style.width=rc.width+'px';
  ddEl.style.right='auto';
  ddEl.innerHTML=ddItems.map((it,j)=>`<div data-j="${j}"><span>${esc(it.name)}</span><small>${esc(it.unit)} · ${fmt(it.price)}</small></div>`).join('');

function ddKeys(e){
  if(!ddEl)return;
  if(e.key==='ArrowDown'){ddHl=Math.min(ddHl+1,ddItems.length-1);hlDD();e.preventDefault();}
  else if(e.key==='ArrowUp'){ddHl=Math.max(ddHl-1,0);hlDD();e.preventDefault();}
  else if(e.key==='Enter'&&ddHl>=0){pickDD(ddHl);e.preventDefault();}
  else if(e.key==='Escape')closeDD();
}
function hlDD(){ddEl.querySelectorAll('div[data-j]').forEach((d,j)=>d.classList.toggle('hl',j===ddHl));}
function pickDD(j){

}

let XLSXlib=null;
async function loadXLSX(){
  if(XLSXlib)return XLSXlib;
  await new Promise((ok,err)=>{const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    sc.onload=ok;sc.onerror=()=>err(new Error('Could not load Excel reader'));document.head.appendChild(sc);});
  XLSXlib=window.XLSX;return XLSXlib;
}
async function handleExcel(e){
  const f=e.target.files[0];if(!f)return;
  const msg=$('#bulkMsg');msg.textContent='Reading file...';
  try{
    const XLSX=await loadXLSX();
    const wb=XLSX.read(await f.arrayBuffer());
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
    // find header row: a row containing something like "item"/"name" and "price"/"rate"
    let hi=-1,ci={name:-1,unit:-1,price:-1};
    for(let i=0;i<Math.min(rows.length,10);i++){
      const low=rows[i].map(c=>String(c).toLowerCase());
      const n=low.findIndex(c=>c.includes('item')||c.includes('name')||c.includes('description'));
      const p=low.findIndex(c=>c.includes('price')||c.includes('rate'));
      if(n>=0&&p>=0){hi=i;ci={name:n,unit:low.findIndex(c=>c.includes('unit')),price:p};break;}
    }
    if(hi<0){msg.innerHTML='<span class="err">Could not find columns. The sheet needs headers like "Item Name" and "Price" (optional "Unit").</span>';return;}
    const items=rows.slice(hi+1).map(r=>({name:String(r[ci.name]||'').trim(),unit:ci.unit>=0?String(r[ci.unit]||'').trim():'',price:r[ci.price]}))
      .filter(r=>r.name&&r.price!==''&&!isNaN(Number(r.price)));
    if(!items.length){msg.innerHTML='<span class="err">No valid rows found.</span>';return;}
    if(!confirm('Found '+items.length+' items in "'+f.name+'". Add them to the list? (exact duplicates will be skipped)'))return;
    msg.textContent='Uploading...';
    const r=await api('/items/bulk',{method:'POST',body:JSON.stringify({items})});
    msg.innerHTML='<span class="ok">Added '+r.added+' items. Skipped '+r.skipped.length+' already in the list'+(r.invalid.length?', '+r.invalid.length+' invalid rows':'')+'.</span>';
    setTimeout(()=>itemsView(),1500);
  }catch(err){msg.innerHTML='<span class="err">'+esc(err.message)+'</span>';}
}

// Pan/zoom/edit state deliberately lives outside cadRenderItems() (module-level) so it survives

let cadPreviewViewBox=null, cadPreviewAdjustMode=false;
function cadBuildDrawingPreview(roomEntries){
  const prev=cadParseResult.preview;
  if(!prev||!prev.bounds||!prev.geometry||!prev.geometry.length)return '';
  const b=prev.bounds;
  const w=b.maxX-b.minX, h=b.maxY-b.minY;
  if(!(w>0)||!(h>0))return '';
  const pad=Math.max(w,h)*0.03;
  const fitVB={x:b.minX-pad, y:-(b.maxY+pad), w:w+pad*2, h:h+pad*2};
  const vb=cadPreviewViewBox||fitVB;
  const scaleRef=Math.max(vb.w,vb.h);
  const sw=scaleRef*0.0015, dotR=scaleRef*0.006, fontSize=scaleRef*0.011, textFontSize=scaleRef*0.01, handleR=scaleRef*0.007;
  const lineShapes=prev.geometry.filter(g=>g.t==='poly').map(g=>{
    const pts=g.pts.map(p=>`${p[0]},${-p[1]}`).join(' ');

  }).join('');
  const circleShapes=prev.geometry.filter(g=>g.t==='circle').map(g=>`<circle cx="${g.x}" cy="${-g.y}" r="${g.r}" fill="none" stroke="${g.color||'#94a3b8'}" stroke-width="${sw}"/>`).join('');
  const pointShapes=prev.geometry.filter(g=>g.t==='point').map(g=>`<circle cx="${g.x}" cy="${-g.y}" r="${dotR}" fill="${g.color||'#94a3b8'}"/>`).join('');
  const textShapes=prev.geometry.filter(g=>g.t==='text').map(g=>`<text x="${g.x}" y="${-g.y}" font-size="${textFontSize}" fill="#64748b">${esc(g.s)}</text>`).join('');
  let roomColorIdx=0;
  const roomShapes=roomEntries.map(({it,i})=>{
    if(!it.vertices||!it.vertices.length)return '';
    const color=cadRoomFillColor(it,it.roomType==='TOILET'?0:roomColorIdx++);
    const pts=it.vertices.map(v=>`${v.x},${-v.y}`).join(' ');
    const cx=it.vertices.reduce((s,v)=>s+v.x,0)/it.vertices.length;
    const cy=-it.vertices.reduce((s,v)=>s+v.y,0)/it.vertices.length;
    const handles=cadPreviewAdjustMode?it.vertices.map((v,j)=>`<circle class="room-handle" data-room="${i}" data-vert="${j}" cx="${v.x}" cy="${-v.y}" r="${handleR}" fill="#fff" stroke="${color}" stroke-width="${sw*1.5}" style="cursor:grab"/>`).join(''):'';
    const labelText=it.autoLabel?`<text id="cad-room-label-${i}" x="${cx}" y="${cy}" font-size="${fontSize}" fill="#111827" text-anchor="middle" style="font-weight:700;paint-order:stroke;stroke:#fff;stroke-width:${fontSize*0.15}">${esc(it.detectedLabel)}</text>`:`<text id="cad-room-label-${i}" x="${cx}" y="${cy}" font-size="0" opacity="0"></text>`;
    const clickAttrs=cadPreviewAdjustMode?` class="cad-room-poly" data-room="${i}" style="cursor:copy"`:'';
    return `<polygon id="cad-room-poly-${i}" points="${pts}" fill="${color}" fill-opacity="0.55" stroke="${color}" stroke-width="${sw*1.5}"${clickAttrs}/>
      ${labelText}
      ${handles}`;
  }).join('');
  return `<div class="card">
    <h2>Drawing preview</h2>
    <p style="font-size:13px;color:var(--gray);margin-bottom:8px">Detected floor areas are highlighted directly on the drawing — toilets in peach, other rooms in blue/purple/green shades — so you can visually confirm they match before assigning materials. Scroll/pinch to zoom, drag to pan.${cadPreviewAdjustMode?' Drag the white handles to reshape a highlighted area, or click anywhere along its outline to add a new corner there.':''}</p>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <button class="btn sm" onclick="cadPreviewZoomBtn(0.8)">Zoom in</button>
      <button class="btn sm" onclick="cadPreviewZoomBtn(1.25)">Zoom out</button>
      <button class="btn sm" onclick="cadPreviewResetView()">Reset view</button>
      ${roomEntries.length?`<button class="btn sm ${cadPreviewAdjustMode?'brand':''}" onclick="cadPreviewToggleAdjust()">${cadPreviewAdjustMode?'Done adjusting':'Adjust floor areas'}</button>`:''}
      <button class="btn sm" onclick="cadAddManualArea()">+ Add area</button>
    </div>
    <div id="cadPreviewContainer" style="background:#0b1220;border-radius:8px;overflow:hidden;height:600px;position:relative">
      <svg id="cadPreviewSvg" viewBox="${vb.x} ${vb.y} ${vb.w} ${vb.h}" style="width:100%;height:100%;display:block;touch-action:none;cursor:grab">
        ${lineShapes}${circleShapes}${pointShapes}${textShapes}${roomShapes}
      </svg>
    </div>
  </div>`;
}
function cadPreviewSvgPoint(svg,evt){
  const pt=svg.createSVGPoint();
  pt.x=evt.clientX; pt.y=evt.clientY;
  const ctm=svg.getScreenCTM();
  if(!ctm)return {x:0,y:0};
  const p=pt.matrixTransform(ctm.inverse());
  return {x:p.x,y:p.y};
}
function cadPreviewGetVB(svg){
  const [x,y,w,h]=svg.getAttribute('viewBox').split(' ').map(Number);
  return {x,y,w,h};
}
function cadPreviewSetVB(svg,vb){
  svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);

}
function cadPreviewZoomBtn(factor){
  const svg=$('#cadPreviewSvg');
  if(!svg)return;
  const vb=cadPreviewGetVB(svg);
  const cx=vb.x+vb.w/2, cy=vb.y+vb.h/2;
  const w=vb.w*factor, h=vb.h*factor;
  cadPreviewSetVB(svg,{x:cx-w/2,y:cy-h/2,w,h});
}
function cadPreviewResetView(){ cadPreviewViewBox=null; cadRenderItems(); }
function cadPreviewToggleAdjust(){ cadPreviewAdjustMode=!cadPreviewAdjustMode; cadRenderItems(); }
function cadClosestPointOnPolyBoundary(pt,verts){
  let best=null;
  for(let i=0;i<verts.length;i++){
    const a=verts[i], b=verts[(i+1)%verts.length];
    const abx=b.x-a.x, aby=b.y-a.y;
    const len2=abx*abx+aby*aby;
    let t=len2>0?((pt.x-a.x)*abx+(pt.y-a.y)*aby)/len2:0;
    t=Math.max(0,Math.min(1,t));
    const px=a.x+abx*t, py=a.y+aby*t;
    const dist=Math.hypot(pt.x-px,pt.y-py);
    if(!best||dist<best.dist)best={dist,edgeIdx:i,point:{x:px,y:py}};
  }
  return best;
}
function cadHandleRoomBoundaryClick(evt,roomIdx){
  const svg=$('#cadPreviewSvg');
  if(!svg)return;
  const p=cadPreviewSvgPoint(svg,evt);
  const dxfPt={x:p.x,y:-p.y};
  const verts=cadParseResult.items[roomIdx].vertices;
  const vb=cadPreviewGetVB(svg);
  const tolerance=Math.max(vb.w,vb.h)*0.05;
  const closest=cadClosestPointOnPolyBoundary(dxfPt,verts);
  if(!closest||closest.dist>tolerance)return;
  verts.splice(closest.edgeIdx+1,0,closest.point);
  cadParseResult.items[roomIdx].area=cadShoelaceAreaJS(verts);
  cadParseResult.items[roomIdx].grossArea=null; cadParseResult.items[roomIdx].netArea=null;
  cadRenderItems();
}
function cadDeleteRoomItem(i){
  if(!confirm('Remove this floor area?'))return;

}
function cadAddManualArea(){
  const svg=$('#cadPreviewSvg');
  let cx,cy,size;
  if(svg){
    const vb=cadPreviewGetVB(svg);
    cx=vb.x+vb.w/2; cy=vb.y+vb.h/2; size=Math.min(vb.w,vb.h)*0.2;
  } else if(cadParseResult.preview&&cadParseResult.preview.bounds){
    const b=cadParseResult.preview.bounds;
    cx=(b.minX+b.maxX)/2; cy=-(b.minY+b.maxY)/2; size=Math.min(b.maxX-b.minX,b.maxY-b.minY)*0.2;
  } else { cx=0;cy=0;size=1000; }
  const half=Math.max(size,1)/2, dxfCx=cx, dxfCy=-cy;
  const verts=[{x:dxfCx-half,y:dxfCy-half},{x:dxfCx+half,y:dxfCy-half},{x:dxfCx+half,y:dxfCy+half},{x:dxfCx-half,y:dxfCy+half}];
  const n=cadParseResult.items.filter(it=>it.kind==='ROOM').length+1;
  const label='New Area '+n;
  cadParseResult.items.push({
    kind:'ROOM', roomType:'ROOM', signature:'ROOM:MANUAL:'+Date.now()+':'+n, type:'ROOM', layer:'manual', blockName:null,
    description:'Room — "'+label+'"', colorName:null, colorHex:null,
    detectedLabel:label, autoLabel:true, count:0, length:0,
    area:cadShoelaceAreaJS(verts), grossArea:null, netArea:null,
    vertices:verts, materialId:null,
  });
  cadPreviewAdjustMode=true;
  cadRenderItems();
}
function cadSetupPreviewInteractions(){
  const svg=$('#cadPreviewSvg');
  if(!svg)return;
  svg.addEventListener('wheel',e=>{
    e.preventDefault();
    const vb=cadPreviewGetVB(svg);
    const p=cadPreviewSvgPoint(svg,e);
    const scale=e.deltaY<0?0.88:1.12;
    const w=Math.max(vb.w*scale,1e-6), h=Math.max(vb.h*scale,1e-6);
    cadPreviewSetVB(svg,{x:p.x-(p.x-vb.x)*scale, y:p.y-(p.y-vb.y)*scale, w, h});
  },{passive:false});
  let panning=false, lastX=0, lastY=0, downX=0, downY=0, downTarget=null;
  const CLICK_SLOP=4;
  svg.addEventListener('pointerdown',e=>{
    if(e.target.classList && e.target.classList.contains('room-handle'))return;
    panning=true; lastX=e.clientX; lastY=e.clientY; downX=e.clientX; downY=e.clientY; downTarget=e.target;
    svg.setPointerCapture(e.pointerId);
    svg.style.cursor='grabbing';
  });
  svg.addEventListener('pointermove',e=>{
    if(!panning)return;
    const vb=cadPreviewGetVB(svg);
    const rect=svg.getBoundingClientRect();
    const sx=vb.w/rect.width, sy=vb.h/rect.height;
    cadPreviewSetVB(svg,{x:vb.x-(e.clientX-lastX)*sx, y:vb.y-(e.clientY-lastY)*sy, w:vb.w, h:vb.h});
    lastX=e.clientX; lastY=e.clientY;
  });
  const endPan=e=>{
    panning=false; svg.style.cursor='grab';
    if(e && downTarget && downTarget.classList && downTarget.classList.contains('cad-room-poly')){
      const moved=Math.hypot(e.clientX-downX,e.clientY-downY);
      if(moved<CLICK_SLOP)cadHandleRoomBoundaryClick(e,Number(downTarget.dataset.room));
    }
    downTarget=null;
  };
  svg.addEventListener('pointerup',endPan);
  svg.addEventListener('pointerleave',()=>{panning=false; svg.style.cursor='grab'; downTarget=null;});
  svg.querySelectorAll('.room-handle').forEach(handle=>{
    handle.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      const roomIdx=Number(handle.dataset.room), vertIdx=Number(handle.dataset.vert);
      handle.setPointerCapture(e.pointerId);
      const move=ev=>{
        const p=cadPreviewSvgPoint(svg,ev);
        cadParseResult.items[roomIdx].vertices[vertIdx]={x:p.x,y:-p.y};
        const verts=cadParseResult.items[roomIdx].vertices;
        const poly=document.getElementById('cad-room-poly-'+roomIdx);
        if(poly)poly.setAttribute('points',verts.map(v=>`${v.x},${-v.y}`).join(' '));
        handle.setAttribute('cx',p.x); handle.setAttribute('cy',p.y);
        const label=document.getElementById('cad-room-label-'+roomIdx);
        if(label){
          label.setAttribute('x',verts.reduce((s,v)=>s+v.x,0)/verts.length);
          label.setAttribute('y',-verts.reduce((s,v)=>s+v.y,0)/verts.length);
        }
      };
      const up=()=>{
        handle.removeEventListener('pointermove',move);
        handle.removeEventListener('pointerup',up);
        const verts=cadParseResult.items[roomIdx].vertices;
        cadParseResult.items[roomIdx].area=cadShoelaceAreaJS(verts);
        cadParseResult.items[roomIdx].grossArea=null;
        cadParseResult.items[roomIdx].netArea=null;
        cadRenderItems();
      };
      handle.addEventListener('pointermove',move);
      handle.addEventListener('pointerup',up);
    });
  });
}

// Flattens Calculate's per-material groups (each either a single self-row, or one row per

// "review checked lines, then add/save/export" flow.
function cadFlattenCalcRows(){
  const rows=[];

    const gRows=g.ingredients.length
      ? g.ingredients.map(i=>({description:i.item||'—',unit:i.unit||'',qty:i.qty,rate:i.price!=null?i.price:'',detail:`${g.material}: ${g.note}`+(i.note?' — '+i.note:'')}))
      : [{description:g.material,unit:g.unit,qty:g.qty,rate:g.price!=null?g.price:'',detail:g.note}];

function cadMaterialDimsSummary(m){
  const parts=[];
  if(m.length_mm&&m.width_mm)parts.push(`${m.length_mm}x${m.width_mm}mm`+(m.height_mm?`x${m.height_mm}mm`:''));
  else if(m.height_mm)parts.push(`height ${m.height_mm}mm`);
  if(m.coverage_m2)parts.push(`${m.coverage_m2}m² coverage`);
  if(m.thickness_mm)parts.push(`${m.thickness_mm}mm thick`);
  return parts.join(', ')||'—';
}
function cadOpenAddMaterial(){cadMatEditId=null;cadMatPick=[];cadMatModalOpen=true;cadRenderMaterialsPage();}
function closeMaterialModal(){cadMatEditId=null;cadMatPick=[];cadMatModalOpen=false;cadRenderMaterialsPage();}
async function cadRenderMaterialsPage(){
  const materials=await api('/cad/materials');
  const items=await api('/items');
  window._cadItems=items;
  const admin=me.role==='ADMIN';
  $('#cadMatArea').innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2 style="margin-bottom:0">Materials (${materials.length})</h2>
      ${admin?`<button class="btn brand fab" style="width:34px;height:34px;border-radius:50%;font-size:18px;line-height:1;padding:0;margin-top:0" title="Add material" onclick="cadOpenAddMaterial()">+</button>`:''}
    </div>
    <p style="font-size:12px;color:var(--gray);margin-bottom:8px">Add materials here directly — no legend needed. A material with ingredients added below is a recipe (e.g. "Plastering" = 1 bag cement + 4 bags fine sand per m²); one with no ingredients is reported as itself (e.g. "Parquet" = so many planks). Dimensions/coverage tell Calculate how to turn a detected length/area/count into a real quantity.</p>
    <div style="overflow-x:auto"><table><thead><tr><th>Material</th><th>Unit</th><th>Dimensions / coverage</th><th>Ingredients</th>${admin?'<th></th>':''}</tr></thead>
    <tbody>${materials.map(m=>`<tr><td>${esc(m.name)}</td><td style="font-size:12px;color:var(--gray)">${esc(m.unit)}</td><td style="font-size:12px;color:var(--gray)">${esc(cadMaterialDimsSummary(m))}</td><td style="font-size:12px;color:var(--gray)">${m.ingredients.map(i=>`${i.qty_per_unit} ${esc(i.item_unit)} ${esc(i.item_name)}`).join(', ')||'none (simple material)'}</td>
    ${admin?`<td style="white-space:nowrap"><div class="actions"><button class="btn sm" onclick="cadEditMaterial(${m.id})">Edit</button> <button class="btn sm danger" onclick="cadDelMaterial(${m.id})">Del</button></div></td>`:''}</tr>`).join('')||`<tr><td colspan="${admin?5:4}" style="color:#999">No materials yet${admin?' — press + to add one.':'.'}</td></tr>`}</tbody></table></div>
  </div>`;
  if(admin)cadRenderMaterialModal(materials);
}
function cadRenderMaterialModal(materials){
  if(!cadMatModalOpen){$('#cadMatModalArea').innerHTML='';return;}
  const editing=cadMatEditId?materials.find(m=>m.id===cadMatEditId):null;
  if(editing && cadMatPick.length===0 && editing.ingredients.length)cadMatPick=editing.ingredients.map(i=>({item_id:i.item_id,name:i.item_name,unit:i.item_unit,qty_per_unit:i.qty_per_unit,price_override:i.price_override}));
  const m=editing||{name:'',unit:'Nos',length_mm:'',width_mm:'',height_mm:'',thickness_mm:'',coverage_m2:'',waste_pct:10,price:''};
  $('#cadMatModalArea').innerHTML=`<div class="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:50" onclick="closeMaterialModal()">
    <div class="modal card" style="max-width:640px;width:100%;margin:0" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="margin-bottom:0">${editing?'Edit material':'Add material'}</h2><button class="btn sm" onclick="closeMaterialModal()">✕</button></div>
      <div class="row2">
        <div><label>Material name</label><input id="cadMatName" value="${esc(m.name)}" placeholder="e.g. Plastering, Parquet, 2.5mm Wire"></div>
        <div><label>Unit (how this material is counted)</label><input id="cadMatUnit" value="${esc(m.unit)}" placeholder="Nos / m / m² / m³ / L / Bag"></div>
      </div>
      <div class="row2" style="margin-top:8px">
        <div><label>Length (mm)</label><input id="cadMatLen" type="number" step="any" value="${m.length_mm??''}" placeholder="piece length, e.g. plank/tile/block" oninput="cadSyncCoverageFromDims()"></div>
        <div><label>Width (mm)</label><input id="cadMatWid" type="number" step="any" value="${m.width_mm??''}" placeholder="piece width" oninput="cadSyncCoverageFromDims()"></div>
      </div>
      <div class="row2" style="margin-top:8px">
        <div><label>Height (mm)</label><input id="cadMatHt" type="number" step="any" value="${m.height_mm??''}" placeholder="e.g. wall height, for a vertical run"></div>
        <div><label>Thickness (mm)</label><input id="cadMatThick" type="number" step="any" value="${m.thickness_mm??''}" placeholder="turns an area into a volume, e.g. concrete"></div>
      </div>
      <div class="row2" style="margin-top:8px">
        <div><label>Area coverage (m² per unit)</label><input id="cadMatCov" type="number" step="any" value="${m.coverage_m2??''}" placeholder="e.g. paint, plastering — overrides length x width" oninput="cadSyncDimsFromCoverage()"></div>
        <div><label>Waste %</label><input id="cadMatWaste" type="number" step="any" value="${m.waste_pct??10}"></div>
      </div>
      <label>Price per unit (optional)</label><input id="cadMatPrice" type="number" step="any" value="${m.price??''}" style="width:160px">
      <p style="font-size:12px;color:var(--gray);margin-top:10px">Length x width auto-fills the area coverage for you (and vice versa) — set whichever you actually know. If you set either, Calculate works out how many pieces/units are needed to cover the detected area. Otherwise the detected quantity itself (length, area, or count) is used directly. Ingredients below scale per 1 unit of this material's own computed quantity.</p>
      <div id="cadIngList" style="margin-top:8px"></div>
      <button class="btn sm" onclick="cadAddIngredientRow()">+ Add ingredient</button>
      <div style="margin-top:10px"><button class="btn brand" onclick="${editing?'cadSaveMaterial('+editing.id+')':'cadAddMaterial()'}">${editing?'Save changes':'Add material'}</button>
      <button class="btn" onclick="closeMaterialModal()">Cancel</button></div>
      <div class="err" id="cadMatErr"></div>
    </div>
  </div>`;
  cadRenderIngredientRows();
}
function cadSyncCoverageFromDims(){
  const l=parseFloat($('#cadMatLen').value), w=parseFloat($('#cadMatWid').value);
  if(l>0&&w>0)$('#cadMatCov').value=Number(((l*w)/1e6).toFixed(4));
}
function cadSyncDimsFromCoverage(){
  const cov=parseFloat($('#cadMatCov').value);
  if(cov>0&&!$('#cadMatLen').value&&!$('#cadMatWid').value){
    const side=Number(Math.sqrt(cov*1e6).toFixed(1));
    $('#cadMatLen').value=side;$('#cadMatWid').value=side;
  }
}
function cadMaterialFormData(){
  return {
    name:$('#cadMatName').value, unit:$('#cadMatUnit').value,
    length_mm:$('#cadMatLen').value, width_mm:$('#cadMatWid').value, height_mm:$('#cadMatHt').value, thickness_mm:$('#cadMatThick').value,
    coverage_m2:$('#cadMatCov').value, waste_pct:$('#cadMatWaste').value, price:$('#cadMatPrice').value,
    ingredients:cadMatPick,
  };
}
function cadRenderIngredientRows(){
  $('#cadIngList').innerHTML=cadMatPick.map((ing,i)=>{
    const selectedItem=window._cadItems.find(it=>it.id===ing.item_id);
    const priceHint=selectedItem&&(ing.price_override===''||ing.price_override==null)?` (item price: ${selectedItem.price})`:'';
    return `
    <div class="row2" style="grid-template-columns:2fr 1fr 1fr auto;align-items:end;margin-bottom:6px">
      <div><label>Item</label><select onchange="cadMatPick[${i}].item_id=Number(this.value);cadRenderIngredientRows()">
        <option value="">— pick —</option>
        ${window._cadItems.map(it=>`<option value="${it.id}" ${ing.item_id===it.id?'selected':''}>${esc(it.name)} (${esc(it.unit)})</option>`).join('')}
      </select></div>
      <div><label>Qty per unit</label><input type="number" step="any" value="${ing.qty_per_unit}" oninput="cadMatPick[${i}].qty_per_unit=this.value"></div>
      <div><label>Price per unit${priceHint?' — leave blank to use':''}</label><input type="number" step="any" value="${ing.price_override??''}" placeholder="${selectedItem?selectedItem.price:'price'}" oninput="cadMatPick[${i}].price_override=this.value"></div>
      <button class="btn sm danger" onclick="cadMatPick.splice(${i},1);cadRenderIngredientRows()">×</button>
    </div>`;}).join('')||'<p style="font-size:12px;color:var(--gray)">No ingredients yet — add one below.</p>';
}
function cadAddIngredientRow(){cadMatPick.push({item_id:'',qty_per_unit:0,note:''});cadRenderIngredientRows();}
async function cadAddMaterial(){
  try{await api('/cad/materials',{method:'POST',body:JSON.stringify(cadMaterialFormData())});cadMatPick=[];cadMatModalOpen=false;cadRenderMaterialsPage();}
  catch(e){$('#cadMatErr').textContent=e.message;}
}
function cadEditMaterial(id){cadMatEditId=id;cadMatPick=[];cadMatModalOpen=true;cadRenderMaterialsPage();}
async function cadSaveMaterial(id){
  try{await api('/cad/materials/'+id,{method:'PUT',body:JSON.stringify(cadMaterialFormData())});cadMatEditId=null;cadMatPick=[];cadMatModalOpen=false;cadRenderMaterialsPage();}
  catch(e){$('#cadMatErr').textContent=e.message;}
}
async function cadDelMaterial(id){if(confirm('Delete this material?')){await api('/cad/materials/'+id,{method:'DELETE'});cadRenderMaterialsPage();}}

// ---------- admin users ----------
async function usersView(){
  const users=await api('/admin/users');
  main.innerHTML=`<div class="card"><h2>User Management</h2>
  <div style="overflow-x:auto"><table style="min-width:820px"><thead><tr><th>Name</th><th>Email</th><th style="width:110px">Role</th><th style="width:200px">Department</th><th style="width:80px">Status</th><th style="width:100px"></th></tr></thead>
  <tbody>${users.map(u=>`<tr>
    <td><b>${esc(u.name)}</b></td><td>${esc(u.email)}</td>
    <td><select style="width:100px" onchange="updUser(${u.id},'role',this.value)"><option ${u.role==='USER'?'selected':''}>USER</option><option ${u.role==='ADMIN'?'selected':''}>ADMIN</option></select></td>
    <td><select style="width:190px" onchange="updUser(${u.id},'department',this.value)"><option value="">—</option>${DEPTS.map(d=>`<option ${u.department===d?'selected':''}>${d}</option>`).join('')}</select></td>
    <td><span class="tag ${u.status}">${u.status}</span></td>
    <td><div class="actions" style="white-space:nowrap">
      ${u.status!=='ACTIVE'?`<button class="btn sm brand" onclick="updUser(${u.id},'status','ACTIVE')">Approve</button>`:''}
      ${u.status==='ACTIVE'&&u.id!==me.id?`<button class="btn sm danger" onclick="updUser(${u.id},'status','DISABLED')">Disable</button>`:''}
    </div></td></tr>`).join('')}
  </tbody></table></div></div>`;
}
async function updUser(id,field,val){
  if(field==='status'&&val==='DISABLED'&&!confirm('Disable this user? They will no longer be able to log in.'))return usersView();
  try{await api('/admin/users/'+id,{method:'PUT',body:JSON.stringify({[field]:val})});usersView();}
  catch(e){alert(e.message);usersView();}
}

// ---------- admin activity log ----------
async function auditView(){
  const rows=await api('/admin/audit');
  const label={ITEM_ADD:'Added item',ITEM_EDIT:'Edited item',ITEM_DELETE:'Deleted item',QUANT_DELETE:'Deleted quantification',USER_UPDATE:'Updated user'};
  main.innerHTML=`<div class="card"><h2>Activity Log <span class="tag USER">master list &amp; admin actions</span></h2>
  <div style="max-height:560px;overflow-y:auto"><table>
  <thead><tr><th>Date &amp; Time (UTC)</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
  <tbody>${rows.map(r=>`<tr><td style="white-space:nowrap">${esc(r.created_at)}</td><td><b>${esc(r.user_name)}</b></td>
    <td><span class="tag ${r.action.startsWith('ITEM')?'ADMIN':'USER'}">${esc(label[r.action]||r.action)}</span></td>
    <td>${esc(r.details)}</td></tr>`).join('')||'<tr><td colspan="4" style="color:#999">No activity recorded yet.</td></tr>'}
  </tbody></table></div></div>`;
}

boot();
</script>
</body>
</html>
